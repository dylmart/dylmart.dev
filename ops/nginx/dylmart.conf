# dylmart.dev — Phase 1 parking on the home server. Tailnet/LAN only (firewall gates exposure).
server {
    listen 8099;
    listen [::]:8099;
    server_name _;

    root /srv/http/dylmart;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
    error_page 404 /404.html;

    # immutable hashed assets
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
